<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Bill DApp</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<style>
body{
  margin:0;
  padding:40px;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
}

.container{
  width:430px;
}

.card{
  background:#1e293b;
  border-radius:14px;
  padding:20px;
  margin-bottom:18px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:6px;
  margin-bottom:14px;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

.small{
  font-size:12px;
  color:#94a3b8;
  margin-top:6px;
}

.status{
  margin-top:10px;
  text-align:center;
}

.result{
  line-height:1.7;
}
</style>
</head>

<body>

<div class="container">

<h1>💸 Split Bill</h1>

<div class="card">
<button onclick="connectWallet()">Connect Wallet</button>
<div class="small" id="wallet">Wallet: -</div>
<div class="small" id="network">Network: -</div>
<div class="status" id="status">Not connected</div>
</div>

<div class="card">
<label>Amount</label>
<input id="amount" placeholder="1000">

<label>Participants (comma separated addresses)</label>
<textarea id="participants" rows="4"
placeholder="0x123..., 0x456..."></textarea>

<button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<button onclick="refreshBalance()">Refresh Balance</button>
<div class="result" id="balanceBox">
No data yet
</div>
</div>

</div>

<script>

let provider, signer, contract;

const contractAddress = "0xD4Fc541236927E2EAf8F27606bD7309C1Fc2cbee";

const abi = [
	{
		"inputs": [
			{
				"internalType": "uint256",
				"name": "totalAmount",
				"type": "uint256"
			},
			{
				"internalType": "address[]",
				"name": "participants",
				"type": "address[]"
			}
		],
		"name": "addExpense",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"anonymous": false,
		"inputs": [
			{
				"indexed": true,
				"internalType": "address",
				"name": "payer",
				"type": "address"
			},
			{
				"indexed": false,
				"internalType": "uint256",
				"name": "totalAmount",
				"type": "uint256"
			}
		],
		"name": "ExpenseAdded",
		"type": "event"
	},
	{
		"inputs": [
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			},
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			}
		],
		"name": "debts",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "getAllUsers",
		"outputs": [
			{
				"internalType": "address[]",
				"name": "",
				"type": "address[]"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "address",
				"name": "user",
				"type": "address"
			}
		],
		"name": "getBalance",
		"outputs": [
			{
				"internalType": "int256",
				"name": "",
				"type": "int256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "address",
				"name": "user",
				"type": "address"
			},
			{
				"internalType": "address",
				"name": "creditor",
				"type": "address"
			}
		],
		"name": "getDebt",
		"outputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			}
		],
		"name": "isUser",
		"outputs": [
			{
				"internalType": "bool",
				"name": "",
				"type": "bool"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"name": "users",
		"outputs": [
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			}
		],
		"stateMutability": "view",
		"type": "function"
	}
];

async function connectWallet(){

  try{

    if(!window.ethereum){
      alert("Install wallet");
      return;
    }

    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);

    signer = provider.getSigner();

    const network = await provider.getNetwork();

    contract = new ethers.Contract(
      contractAddress,
      abi,
      signer
    );

    const address = await signer.getAddress();

    document.getElementById("wallet").innerText =
      "Wallet: " +
      address.slice(0,6) +
      "..." +
      address.slice(-4);

    document.getElementById("network").innerText =
      "Network: " + network.chainId;

    document.getElementById("status").innerText =
      "Connected ✔";

  }catch(err){
    document.getElementById("status").innerText =
      "Connection failed";
  }
}

async function addExpense(){

  try{

    const amount =
      document.getElementById("amount").value;

    const raw =
      document.getElementById("participants").value;

    const addresses = raw
      .split(",")
      .map(x => x.trim())
      .filter(x => ethers.utils.isAddress(x));

    if(!amount || addresses.length == 0){
      alert("Invalid input");
      return;
    }

    document.getElementById("status").innerText =
      "Sending transaction...";

    const tx = await contract.addExpense(
      amount,
      addresses
    );

    await tx.wait();

    document.getElementById("status").innerText =
      "Expense added ✔";

  }catch(err){

    document.getElementById("status").innerText =
      "Transaction failed";

  }
}

async function refreshBalance(){

  try{

    const user = await signer.getAddress();

    const balance =
      await contract.getBalance(user);

    document.getElementById("balanceBox").innerHTML =
      "Net Balance: <b>" +
      balance.toString() +
      "</b><br><br>" +
      "Positive = others owe you<br>" +
      "Negative = you owe others";

  }catch(err){

    document.getElementById("balanceBox").innerText =
      "Error loading data";

  }
}

</script>

</body>
</html>
