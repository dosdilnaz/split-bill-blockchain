<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Split Bill DApp</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 420px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

h1 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

.status {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
}

.balance {
  font-size: 20px;
  text-align: center;
  margin-bottom: 10px;
}

.small {
  font-size: 12px;
  color: #94a3b8;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>💸 Split Bill</h1>

<div class="card">
  <button onclick="connectWallet()">Connect Wallet</button>
  <div class="small" id="address">Address: -</div>
  <div class="small" id="network">Network: -</div>
  <div class="status" id="status">Not connected</div>
</div>

<div class="card">
  <div class="balance" id="balance">Balance: 0 ETH</div>
  <button onclick="checkBalance()">Refresh Balance</button>
</div>

<div class="card">
  <label>Amount (ETH)</label>
  <input id="amount" placeholder="0.01">

  <label>Participants (comma separated)</label>
  <textarea id="participant" placeholder="0x123..., 0x456..."></textarea>

  <button onclick="addExpense()">Add Expense</button>
</div>

</div>

<script>

let provider, signer, contract;

const contractAddress = "0x5586083DEEEe0bC0feDA9da8b02E8B4f3A38A395"; // ОБЯЗАТЕЛЬНО

const abi = [
  {
    "inputs": [{"internalType":"address[]","name":"participants","type":"address[]"}],
    "name":"addExpense",
    "outputs":[],
    "stateMutability":"payable",
    "type":"function"
  },
  {
    "inputs":[{"internalType":"address","name":"user","type":"address"}],
    "name":"getBalance",
    "outputs":[{"internalType":"int256","name":"","type":"int256"}],
    "stateMutability":"view",
    "type":"function"
  }
];

// ловим ошибки
window.onerror = (msg) => {
  document.getElementById("status").innerText = "JS Error: " + msg;
};

async function connectWallet() {
  try {
    if (!window.ethereum) {
      alert("Install MetaMask");
      return;
    }

    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);

    signer = provider.getSigner();

    const network = await provider.getNetwork();

    contract = new ethers.Contract(contractAddress, abi, signer);

    const address = await signer.getAddress();

    document.getElementById("address").innerText =
      "Address: " + address.slice(0,6) + "..." + address.slice(-4);

    document.getElementById("network").innerText =
      "Network: " + network.chainId;

    document.getElementById("status").innerText = "Connected ✔";

    checkBalance();

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Connection failed";
  }
}

async function addExpense() {
  try {
    if (!contract) {
      alert("Connect wallet first");
      return;
    }

    const amount = document.getElementById("amount").value;
    const raw = document.getElementById("participant").value;

    const addresses = raw.split(",")
      .map(a => a.trim())
      .filter(a => ethers.utils.isAddress(a));

    if (!amount  isNaN(amount)  addresses.length === 0) {
      alert("Invalid input");
      return;
    }

    document.getElementById("status").innerText = "Sending transaction...";

    const tx = await contract.addExpense(addresses, {
      value: ethers.utils.parseEther(amount)
    });

    await tx.wait();

    document.getElementById("status").innerText = "Expense added ✔";

    checkBalance();

  } catch (err) {
console.error(err);
    document.getElementById("status").innerText = "Transaction failed";
  }
}

async function checkBalance() {
  try {
    if (!contract) return;

    const address = await signer.getAddress();
    const balance = await contract.getBalance(address);

    const formatted = ethers.utils.formatEther(balance.toString());

    document.getElementById("balance").innerText =
      "Balance: " + formatted + " ETH";

  } catch (err) {
    console.error(err);
  }
}

// фикс для кнопок
window.connectWallet = connectWallet;
window.addExpense = addExpense;
window.checkBalance = checkBalance;

</script>

</body>
</html>
